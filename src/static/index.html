<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Research Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f0f0f;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            color: #7c3aed;
        }

        p.subtitle {
            color: #888;
            margin-bottom: 40px;
            font-size: 0.95rem;
        }

        .search-box {
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 700px;
            margin-bottom: 30px;
        }

        input {
            flex: 1;
            padding: 14px 18px;
            border-radius: 10px;
            border: 1px solid #333;
            background: #1a1a1a;
            color: #fff;
            font-size: 1rem;
            outline: none;
        }

        input:focus { border-color: #7c3aed; }

        button {
            padding: 14px 24px;
            background: #7c3aed;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: background 0.2s;
        }

        button:hover { background: #6d28d9; }
        button:disabled { background: #444; cursor: not-allowed; }

        #result-box {
            width: 100%;
            max-width: 700px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 24px;
            display: none;
            white-space: pre-wrap;
            line-height: 1.7;
            font-size: 0.95rem;
        }

        .loading {
            color: #7c3aed;
            font-style: italic;
        }
    </style>
</head>
<body>
    <h1>🤖 AI Research Assistant</h1>
    <p class="subtitle">Powered by Llama 3.3 + LangGraph</p>

    <div class="search-box">
        <input 
            type="text" 
            id="query-input" 
            placeholder="Enter a research topic..."
        />
        <button id="search-btn" onclick="runResearch()">Research</button>
    </div>

    <div id="result-box"></div>

    <script>
        async function runResearch() {
            const query = document.getElementById("query-input").value.trim();
            if (!query) return;

            const btn = document.getElementById("search-btn");
            const resultBox = document.getElementById("result-box");

            btn.disabled = true;
            btn.textContent = "Researching...";
            resultBox.style.display = "block";
            resultBox.innerHTML = '<span class="loading">⏳ Agents are working... this takes 15-30 seconds</span>';

            try {
                const response = await fetch("http://127.0.0.1:8000/research", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ query })
                });

                const data = await response.json();
                resultBox.textContent = data.report;
            } catch (error) {
                resultBox.textContent = "Error: Could not connect to the backend.";
            } finally {
                btn.disabled = false;
                btn.textContent = "Research";
            }
        }

        // Allow pressing Enter to search
        document.getElementById("query-input")
            .addEventListener("keypress", function(e) {
                if (e.key === "Enter") runResearch();
            });
    </script>
</body>
</html>
